<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Review Nest Industrial Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:linear-gradient(135deg,#eaf6ff,#ffffff);padding:15px;}

.header{
background:rgba(255,255,255,0.85);
backdrop-filter:blur(12px);
padding:18px;
border-radius:18px;
text-align:center;
font-size:20px;
font-weight:600;
color:#1565c0;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
margin-bottom:20px;
}

.dashboard{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.card{
background:white;
padding:20px;
border-radius:18px;
text-align:center;
cursor:pointer;
transition:0.3s;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}
.card i{font-size:22px;color:#1565c0;margin-bottom:8px;}

.page{display:none;margin-top:20px;}

input,select{
width:100%;padding:10px;margin-bottom:10px;
border-radius:10px;border:1px solid #bbdefb;font-size:13px;
}

button{
padding:7px 12px;border:none;border-radius:8px;
background:#1565c0;color:white;font-size:12px;cursor:pointer;margin:2px;
}

.smallBtn{padding:5px 7px;font-size:12px;}
.backBtn{background:#777;margin-bottom:15px;}

.folder{
background:white;padding:12px;border-radius:12px;
margin-bottom:10px;box-shadow:0 3px 10px rgba(0,0,0,0.05);
display:flex;justify-content:space-between;align-items:center;
cursor:pointer;
}

.tableWrapper{
background:white;border-radius:12px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
margin-top:10px;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
font-size:12px;
}

th{
background:#1976d2;color:white;padding:8px;
border:1px solid #cfe3ff;
}

td{
padding:6px;border:1px solid #e2e2e2;text-align:center;
word-break:break-word;
}

.publishRow{background:#e8f5e9;}
.unpublishRow{background:#ffebee;}
.paidRow{background:#eafaf1;}
.unpaidRow{background:#fdeaea;}

.paidBtn{background:#2ecc71;}
.unpaidBtn{background:#e74c3c;}
.copyBtn{background:#3498db;}
.deleteBtn{background:#555;}
</style>
</head>

<body>

<div class="header">
<i class="fa-solid fa-layer-group"></i> Review Nest Industrial Dashboard
</div>

<div class="dashboard">
<div class="card" onclick="openPage('trackerPage')"><i class="fa-solid fa-plus"></i><p>App Tracker</p></div>
<div class="card" onclick="openPage('clientPage')"><i class="fa-solid fa-users"></i><p>Client File</p></div>
<div class="card" onclick="openPage('universalPage')"><i class="fa-solid fa-table"></i><p>Universal File</p></div>
<div class="card" onclick="openPage('clientTrackerPage')"><i class="fa-solid fa-folder-open"></i><p>Client Tracker</p></div>
</div>

<!-- ADD APP -->
<div class="page" id="trackerPage">
<button class="backBtn" onclick="goHome()">Back</button>
<h2>Add App</h2>
<input type="text" id="appName" placeholder="App Name">
<select id="clientSelect"></select>
<input type="date" id="appDate">
<input type="number" id="appPrice" placeholder="Price">
<input type="text" id="appHint" placeholder="Hint">
<button onclick="addApp()">Add</button>
</div>

<!-- CLIENT -->
<div class="page" id="clientPage">
<button class="backBtn" onclick="goHome()">Back</button>
<h2>Client File</h2>
<input type="text" id="clientName" placeholder="Client Name">
<button onclick="addClient()">Add Client</button>
<div id="clientList"></div>
</div>

<!-- UNIVERSAL -->
<div class="page" id="universalPage">
<button class="backBtn" onclick="goHome()">Back</button>
<h2>Universal Excel Sheet</h2>
<div class="tableWrapper">
<table id="universalTable"></table>
</div>
</div>

<!-- CLIENT TRACKER -->
<div class="page" id="clientTrackerPage">
<button class="backBtn" onclick="goHome()">Back</button>
<h2>Client Excel Sheet</h2>
<div id="clientFolders"></div>
<div id="clientApps"></div>
</div>

<script>

let clients=JSON.parse(localStorage.getItem("clients"))||[];
let apps=JSON.parse(localStorage.getItem("apps"))||[];

function save(){
localStorage.setItem("clients",JSON.stringify(clients));
localStorage.setItem("apps",JSON.stringify(apps));
}

function formatDate(d){
return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'long',year:'numeric'});
}

function openPage(id){
document.querySelector(".dashboard").style.display="none";
document.querySelectorAll(".page").forEach(p=>p.style.display="none");
document.getElementById(id).style.display="block";
render();
}

function goHome(){
document.querySelector(".dashboard").style.display="grid";
document.querySelectorAll(".page").forEach(p=>p.style.display="none");
}

/* CLIENT */
function addClient(){
let name=document.getElementById("clientName").value.trim();
if(!name) return;
if(clients.includes(name)) return alert("Client exists");
clients.push(name);
save();render();
}

function deleteClient(i){
if(confirm("Delete client and all apps?")){
let name=clients[i];
apps=apps.filter(a=>a.client!==name);
clients.splice(i,1);
save();render();
}
}

/* APP */
function addApp(){
let app=document.getElementById("appName").value.trim();
let client=document.getElementById("clientSelect").value;
let date=document.getElementById("appDate").value;
let price=document.getElementById("appPrice").value;
let hint=document.getElementById("appHint").value;

if(!app||!client||!date) return;

let d=new Date(date);

apps.push({
app,client,date,
price:price||0,
hint,
month:d.getMonth()+1,
year:d.getFullYear(),
publish:false,
paid:false
});

save();render();
}

/* ✅ FIXED TOGGLE */
function togglePublish(i){
apps[i].publish=!apps[i].publish;
save();

let a=apps[i];
let key=`${a.month}-${a.year}`;
refreshGroup(key);
}

/* DELETE */
function deleteApp(index,client){
if(confirm("Delete this app?")){
let a=apps[index];
let key=`${a.month}-${a.year}`;
apps.splice(index,1);
save();
refreshGroup(key);
openClient(client);
}
}

/* REFRESH GROUP ONLY */
function refreshGroup(key){
let el=document.getElementById("uni_"+key);
if(!el) return;

let data=apps.filter(a=>`${a.month}-${a.year}`===key);

let html=`
<tr>
<th>App</th><th>Date</th><th>Client</th>
<th>Hint</th><th>Publish</th><th>Action</th>
</tr>`;

data.forEach(a=>{
html+=`
<tr class="${a.publish?'publishRow':'unpublishRow'}">
<td>${a.app}</td>
<td>${formatDate(a.date)}</td>
<td>${a.client}</td>
<td>${a.hint||"-"}</td>
<td>
<button onclick="togglePublish(${apps.indexOf(a)})">
<i class="fa-solid ${a.publish?'fa-check':'fa-xmark'}"></i>
</button>
</td>
<td>
<div style="display:flex;gap:4px;justify-content:center">
<button class="copyBtn" onclick='copyText(${JSON.stringify(a)})'><i class="fa fa-copy"></i></button>
<button class="deleteBtn" onclick="deleteApp(${apps.indexOf(a)},'${a.client}')"><i class="fa fa-trash"></i></button>
</div>
</td>
</tr>`;
});

el.innerHTML=html;
}

/* COPY */
function copyText(a){
let text=`App Name: ${a.app}
Date: ${formatDate(a.date)}
Price: ₹${a.price||0}
Hint: ${a.hint||"-"}`;
navigator.clipboard.writeText(text);
alert("Copied!");
}

/* RENDER */
function render(){

let select=document.getElementById("clientSelect");
if(select){
select.innerHTML="";
clients.forEach(c=>select.innerHTML+=`<option>${c}</option>`);
}

let ut=document.getElementById("universalTable");
if(ut){
ut.innerHTML="";
let groups={};

apps.forEach(a=>{
let key=`${a.month}-${a.year}`;
if(!groups[key]) groups[key]=[];
groups[key].push(a);
});

Object.keys(groups).sort().reverse().forEach(key=>{
ut.innerHTML+=`
<tr>
<th colspan="6" onclick="toggleGroup('${key}','uni')" style="cursor:pointer;background:#0d47a1;color:white">
📁 Month: ${key}
</th>
</tr>
<tbody id="uni_${key}" style="display:none"></tbody>`;
});
}

/* CLIENT LIST */
let cl=document.getElementById("clientList");
if(cl){
cl.innerHTML="";
clients.forEach((c,i)=>{
cl.innerHTML+=`
<div class="folder">
<span>${c}</span>
<button class="deleteBtn smallBtn" onclick="deleteClient(${i})">
<i class="fa fa-trash"></i>
</button>
</div>`;
});
}

/* FOLDERS */
let folders=document.getElementById("clientFolders");
if(folders){
folders.innerHTML="";
clients.forEach(c=>{
folders.innerHTML+=`<div class="folder" onclick="openClient('${c}')">${c}</div>`;
});
}
}

/* GROUP OPEN */
function toggleGroup(key,type){
let el=document.getElementById(type+"_"+key);
if(!el) return;

if(el.style.display==="none"||el.style.display===""){
el.style.display="table-row-group";
refreshGroup(key);
}else{
el.style.display="none";
}
}

/* CLIENT VIEW */
function openClient(client){
let area=document.getElementById("clientApps");

let filtered=apps.filter(a=>a.client===client);

let html=`<h3>${client}</h3><div class="tableWrapper"><table>
<tr>
<th>Sr</th><th>App</th><th>Date</th><th>Price</th><th>Hint</th><th>Paid</th><th>Action</th>
</tr>`;

filtered.forEach((a,i)=>{
html+=`
<tr class="${a.paid?'paidRow':'unpaidRow'}">
<td>${i+1}</td>
<td>${a.app}</td>
<td>${formatDate(a.date)}</td>
<td>₹${a.price||0}</td>
<td>${a.hint||"-"}</td>
<td>
<button class="${a.paid?'paidBtn':'unpaidBtn'}"
onclick="togglePaid(${apps.indexOf(a)});openClient('${client}')">
<i class="fa-solid ${a.paid?'fa-circle-check':'fa-circle-xmark'}"></i>
</button>
</td>
<td>
<div style="display:flex;gap:4px;justify-content:center">
<button class="copyBtn" onclick='copyText(${JSON.stringify(a)})'><i class="fa fa-copy"></i></button>
<button class="deleteBtn" onclick="deleteApp(${apps.indexOf(a)},'${client}')"><i class="fa fa-trash"></i></button>
</div>
</td>
</tr>`;
});

html+="</table></div>";
area.innerHTML=html;
}

function togglePaid(i){
apps[i].paid=!apps[i].paid;
save();
}

render();

</script>

</body>
</html>
